# Пример для /etc/nginx/sites-available/aichamp.levellab.ru
# Не трогает конфиг metodist.pro — отдельный server_name и root.

server {
    listen 80;
    server_name aichamp.levellab.ru;

    root /var/www/aichamp.levellab.ru;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}

# После certbot появится блок listen 443 ssl с сертификатом.
# Команда на сервере (один раз):
#   sudo mkdir -p /var/www/aichamp.levellab.ru
#   sudo certbot --nginx -d aichamp.levellab.ru
