name: Deploy landing to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare directory on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -euo pipefail
            DIR="${{ secrets.VPS_APP_DIR }}"
            if [ ! -d "$DIR" ]; then
              mkdir -p "$DIR" 2>/dev/null || sudo mkdir -p "$DIR"
            fi
            sudo chown -R "$USER:$USER" "$DIR"

      - name: Copy static files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "index.html,privacy.html"
          target: ${{ secrets.VPS_APP_DIR }}
          overwrite: true

      - name: Fix permissions
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            chmod 644 ${{ secrets.VPS_APP_DIR }}/index.html ${{ secrets.VPS_APP_DIR }}/privacy.html
