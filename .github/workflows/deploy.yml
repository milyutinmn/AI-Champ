name: Deploy landing to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare directory on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -euo pipefail
            DIR="${{ secrets.VPS_APP_DIR }}"
            if [ ! -d "$DIR" ]; then
              echo "ERROR: $DIR not found. On server run once:"
              echo "  sudo mkdir -p $DIR && sudo chown \$USER:\$USER $DIR"
              exit 1
            fi
            if [ ! -w "$DIR" ]; then
              echo "ERROR: $DIR is not writable by $USER"
              exit 1
            fi

      - name: Copy static files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "index.html,privacy.html"
          target: ${{ secrets.VPS_APP_DIR }}
          overwrite: true

      - name: Fix permissions
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            chmod 644 ${{ secrets.VPS_APP_DIR }}/index.html ${{ secrets.VPS_APP_DIR }}/privacy.html

      - name: Copy nginx config to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "deploy/nginx-aichamp.conf"
          target: "/tmp"
          strip_components: 1
          overwrite: true

      - name: Configure nginx and SSL
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            DOMAIN="aichamp.levellab.ru"
            NGINX_TMP=""
            for f in /tmp/nginx-aichamp.conf /tmp/deploy/nginx-aichamp.conf; do
              if [ -f "$f" ]; then NGINX_TMP="$f"; break; fi
            done
            if [ -z "$NGINX_TMP" ]; then
              echo "nginx config not found in /tmp"
              ls -la /tmp
              exit 1
            fi
            sudo cp "$NGINX_TMP" "/etc/nginx/sites-available/${DOMAIN}"
            sudo ln -sf "/etc/nginx/sites-available/${DOMAIN}" "/etc/nginx/sites-enabled/${DOMAIN}"
            sudo nginx -t
            sudo systemctl reload nginx
            if ! sudo certbot certificates 2>/dev/null | grep -q "${DOMAIN}"; then
              sudo certbot --nginx -d "${DOMAIN}" --non-interactive --agree-tos -m milyutin.mn@gmail.com --redirect || echo "certbot skipped — configure SSL manually"
            fi
